<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quotation Builder</title>
<style>
:root {
  --brand: #b3202a;
  --brand-dark: #8c1922;
  --brand-tint: #fbe9ea;
  --brand-tint-strong: #f6d3d5;
  --ink: #1c1d21;
  --ink-muted: #6b7280;
  --border: #e6e5e8;
  --surface: #ffffff;
  --bg-start: #f4f4f6;
  --bg-end: #eceaec;
  --radius-lg: 14px;
  --radius-md: 10px;
  --radius-sm: 7px;
  --shadow-card: 0 1px 2px rgba(20,20,25,0.04), 0 8px 24px -12px rgba(20,20,25,0.10);
  --shadow-pop: 0 12px 32px -8px rgba(20,20,25,0.20), 0 2px 8px rgba(20,20,25,0.08);
}

* { box-sizing: border-box; }

html {
  min-height: 100%;
  /* Layered brand-tinted glows over a soft neutral gradient = ambient wallpaper */
  background:
    radial-gradient(1100px 620px at 12% -8%, rgba(179,32,42,0.14), transparent 58%),
    radial-gradient(900px 520px at 108% 2%, rgba(52,74,140,0.10), transparent 55%),
    radial-gradient(760px 760px at 50% 118%, rgba(179,32,42,0.07), transparent 60%),
    linear-gradient(180deg, #f7f7fa 0%, #eef0f4 46%, #e8e6ec 100%);
  background-attachment: fixed;
}

body {
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  color: var(--ink);
  background: transparent;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* Fine dot-grid texture, fading out toward the bottom */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-image: radial-gradient(rgba(28,29,33,0.05) 1px, transparent 1.4px);
  background-size: 24px 24px;
  background-position: -12px -12px;
  -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 78%);
          mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 78%);
}

.page-header { margin-bottom: 28px; }
.page-header .eyebrow {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--brand);
  background: var(--brand-tint);
  padding: 4px 10px;
  border-radius: 999px;
  margin-bottom: 10px;
}
h1 {
  margin: 0 0 6px;
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.page-header p {
  margin: 0;
  color: var(--ink-muted);
  font-size: 0.92rem;
}

.panel {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px) saturate(1.08);
  -webkit-backdrop-filter: blur(12px) saturate(1.08);
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: var(--radius-lg);
  padding: 22px 24px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.65);
}
.panel h2 {
  margin: 0 0 18px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  padding-left: 12px;
  border-left: 3px solid var(--brand);
  line-height: 1.1;
}

.form-row {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 6px;
  margin-bottom: 16px;
}
.form-row:last-child { margin-bottom: 0; }
.form-row label {
  font-size: 0.76rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.form-row input[type="text"],
.form-row input[type="number"],
.form-row select,
.form-row textarea {
  width: 100%;
  max-width: 420px;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 0.92rem;
  font-family: inherit;
  color: var(--ink);
  background: var(--surface);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.form-row input[type="text"]:hover,
.form-row input[type="number"]:hover,
.form-row textarea:hover { border-color: #cfced3; }
.form-row input[type="text"]:focus,
.form-row input[type="number"]:focus,
.form-row select:focus,
.form-row textarea:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3.5px var(--brand-tint);
}
.form-row textarea { resize: vertical; }

.autocomplete-wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
}
.autocomplete-wrap input[type="text"] {
  max-width: none;
  width: 100%;
}

.suggestions {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  z-index: 20;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  max-height: 260px;
  overflow-y: auto;
  display: none;
  box-shadow: var(--shadow-pop);
  padding: 6px;
}
.suggestions.open { display: block; }
.suggestions div {
  padding: 8px 10px;
  font-size: 0.85rem;
  line-height: 1.35;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.1s ease;
}
.suggestions div:hover,
.suggestions div.active { background: var(--brand-tint); }
.suggestions .sug-sku { font-weight: 700; color: var(--ink); }
.suggestions .sug-name { color: var(--ink-muted); }

.product-name-display {
  display: block;
  width: 100%;
  max-width: 420px;
  padding: 10px 13px;
  font-size: 0.88rem;
  color: var(--ink);
  min-height: 1.2em;
  white-space: pre-line;
  background: #faf9fa;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-md);
  line-height: 1.5;
}
.product-name-display.placeholder { color: #a8a7ac; font-style: italic; }

.product-preview-wrap {
  display: none;
  margin-bottom: 10px;
}
.product-preview-wrap.visible { display: block; }
.product-preview-img {
  max-width: 220px;
  max-height: 220px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  display: block;
  object-fit: contain;
  background: #faf9fa;
}

.product-thumb {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #faf9fa;
  vertical-align: middle;
  margin-right: 10px;
  flex-shrink: 0;
}
.product-cell {
  display: flex;
  align-items: center;
}

button {
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  padding: 10px 20px;
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(179,32,42,0.25), 0 6px 14px -6px rgba(179,32,42,0.45);
  transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
}
button:hover { background: var(--brand-dark); transform: translateY(-1px); }
button:active { transform: translateY(0); }
button:focus-visible { outline: 2px solid var(--brand-dark); outline-offset: 2px; }

.btn-secondary {
  background: var(--surface);
  color: var(--brand);
  border: 1.5px solid var(--brand-tint-strong);
  box-shadow: none;
}
.btn-secondary:hover { background: var(--brand-tint); color: var(--brand-dark); }

.btn-generate {
  width: 100%;
  padding: 13px 20px;
  font-size: 0.95rem;
}

.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.86rem;
  min-width: 480px;
}
th, td {
  padding: 11px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th {
  background: #faf9fa;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
td:nth-child(2), td:nth-child(3), td:nth-child(4),
th:nth-child(2), th:nth-child(3), th:nth-child(4) { text-align: right; }
tbody tr { cursor: pointer; transition: background 0.1s ease; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #faf9fa; }
tbody tr.selected { background: var(--brand-tint); }
tbody tr.selected:hover { background: var(--brand-tint-strong); }
.empty-row td {
  text-align: center;
  color: var(--ink-muted);
  font-style: italic;
  padding: 28px 14px;
  cursor: default;
}

.table-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.grand-total-pill {
  display: flex;
  align-items: baseline;
  gap: 8px;
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: 999px;
}
.grand-total-pill .label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #c9c9cd;
}
#grandTotalDisplay {
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.01em;
}
</style>
</head>
<body>

  <header class="page-header">
    <span class="eyebrow">Tanko Malaysia</span>
    <h1>Quotation Builder</h1>
    <p>Search a SKU, add it to the quote, and generate a customer-ready document.</p>
  </header>

  <section class="panel">
    <h2>Customer Details</h2>
    <div class="form-row">
      <label for="customerName">Customer Name</label>
      <input type="text" id="customerName" placeholder="e.g. Ahmad bin Ismail">
    </div>
    <div class="form-row">
      <label for="customerContact">Contact</label>
      <input type="text" id="customerContact" placeholder="e.g. 012-345 6789">
    </div>
    <div class="form-row">
      <label for="customerAddress">Address</label>
      <textarea id="customerAddress" rows="2" placeholder="Delivery / billing address"></textarea>
    </div>

    <div class="form-row">
      <label class="checkbox-inline" style="flex-direction:row; align-items:center; gap:8px; text-transform:none; cursor:pointer;">
        <input type="checkbox" id="deliveryFeeCheck" style="width:auto; max-width:none; margin:0;">
        <span style="font-size:0.76rem; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:var(--ink-muted);">Delivery fee</span>
      </label>
    </div>

    <div class="form-row" id="deliveryFeeFields" style="display:none;">
      <div style="display:flex; gap:8px; max-width:420px;">
        <input type="text" id="deliveryDesc" placeholder="Delivery description" style="flex:1 1 auto; max-width:none;">
        <input type="number" id="deliveryPrice" placeholder="Price" min="0" step="0.01" style="flex:0 0 110px; width:110px; max-width:110px;">
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>Add Product</h2>

    <div class="form-row">
      <label for="skuSearch">SKU Code</label>
      <div class="autocomplete-wrap">
        <input type="text" id="skuSearch" placeholder="Type SKU code..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
      </div>
    </div>

    <div id="productPreviewWrap" class="product-preview-wrap">
      <img id="productPreviewImg" class="product-preview-img" alt="Product photo">
    </div>

    <div class="form-row">
      <label>Product Name</label>
      <span id="productNameDisplay" class="product-name-display placeholder">No product selected yet</span>
    </div>

    <div class="form-row">
      <label for="qtyInput">Quantity</label>
      <input type="number" id="qtyInput" value="1" min="1" step="1">
    </div>

    <div class="form-row">
      <button id="addItemBtn" type="button">Add Item</button>
    </div>
  </section>

  <section class="panel">
    <h2>Current Quote</h2>
    <div class="table-wrap">
      <table id="itemsTable">
        <thead>
          <tr>
            <th>Product</th>
            <th>Qty</th>
            <th>Unit Price (RM)</th>
            <th>Total (RM)</th>
          </tr>
        </thead>
        <tbody id="itemsTableBody"></tbody>
      </table>
    </div>

    <div class="table-actions">
      <button id="deleteItemBtn" type="button" class="btn-secondary">Delete Selected Item</button>
      <div class="grand-total-pill">
        <span class="label">Grand Total</span>
        <span id="grandTotalDisplay">RM 0.00</span>
      </div>
    </div>
  </section>

  <section class="panel">
    <button id="generateDocBtn" type="button" class="btn-generate">Generate Document</button>
  </section>

let quoteItems = [];
let selectedRowIndex = null;
let selectedProduct = null;
let activeSuggestionIndex = -1;

const el = {
  customerName: document.getElementById("customerName"),
  customerContact: document.getElementById("customerContact"),
  customerAddress: document.getElementById("customerAddress"),

  deliveryFeeCheck: document.getElementById("deliveryFeeCheck"),
  deliveryFeeFields: document.getElementById("deliveryFeeFields"),
  deliveryDesc: document.getElementById("deliveryDesc"),
  deliveryPrice: document.getElementById("deliveryPrice"),

  skuSearch: document.getElementById("skuSearch"),
  suggestions: document.getElementById("suggestions"),
  productNameDisplay: document.getElementById("productNameDisplay"),
  productPreviewWrap: document.getElementById("productPreviewWrap"),
  productPreviewImg: document.getElementById("productPreviewImg"),
  qtyInput: document.getElementById("qtyInput"),

  addItemBtn: document.getElementById("addItemBtn"),
  deleteItemBtn: document.getElementById("deleteItemBtn"),
  generateDocBtn: document.getElementById("generateDocBtn"),

  itemsTableBody: document.getElementById("itemsTableBody"),
  grandTotalDisplay: document.getElementById("grandTotalDisplay"),
};

function fillSelect(selectEl, options, placeholder) {
  selectEl.innerHTML = "";
  if (placeholder) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = placeholder;
    opt.disabled = true;
    opt.selected = true;
    selectEl.appendChild(opt);
  }
  options.forEach((value) => {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = value;
    selectEl.appendChild(opt);
  });
}

function searchSkus(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];

  const startsWithMatches = [];
  const containsMatches = [];
  PRODUCT_DATA.forEach((p) => {
    const skuLower = p.sku.toLowerCase();
    if (skuLower.startsWith(q)) {
      startsWithMatches.push(p);
    } else if (skuLower.includes(q)) {
      containsMatches.push(p);
    }
  });

  return startsWithMatches.concat(containsMatches);
}

function renderSuggestions(results) {
  activeSuggestionIndex = -1;
  el.suggestions.innerHTML = "";
  if (results.length === 0) {
    el.suggestions.classList.remove("open");
    return;
  }
  results.forEach((product) => {
    const item = document.createElement("div");
    item.innerHTML =
      "<span class=\"sug-sku\">" + escapeHtml(product.sku) + "</span>" +
      "<span class=\"sug-name\"> - " + escapeHtml(product.name.replace(/\n/g, " / ")) + "</span>";
    item.addEventListener("click", () => selectProduct(product));
    el.suggestions.appendChild(item);
  });
  el.suggestions.classList.add("open");
}

// PRODUCT_IMAGES (declared above, next to PRODUCT_DATA) maps a SKU straight
// to its resolved filename in assets/product/ -- already reconciled against
// whatever extension (.png/.jpg) and spacing/case the actual file uses, so
// no runtime guessing is needed. SKUs not in the map simply have no photo yet.
function getProductImagePath(sku) {
  const file = PRODUCT_IMAGES[sku];
  return file ? "assets/product/" + encodeURIComponent(file) : null;
}

function showProductPreviewImage(sku) {
  const path = getProductImagePath(sku);
  if (!path) {
    el.productPreviewWrap.classList.remove("visible");
    return;
  }
  el.productPreviewImg.onerror = () => {
    el.productPreviewWrap.classList.remove("visible");
  };
  el.productPreviewImg.onload = () => {
    el.productPreviewWrap.classList.add("visible");
  };
  el.productPreviewImg.src = path;
}

function hideProductPreviewImage() {
  el.productPreviewWrap.classList.remove("visible");
  el.productPreviewImg.removeAttribute("src");
}

// Called from the inline onerror="" on table thumbnails (built via innerHTML
// strings, so this needs to be a plain global function).
function handleThumbError(imgEl) {
  imgEl.style.display = "none";
}

function selectProduct(product) {
  selectedProduct = product;
  el.skuSearch.value = product.sku;
  el.productNameDisplay.innerHTML = nl2brWithBoldSku(product.sku + "\n" + product.name);
  el.productNameDisplay.classList.remove("placeholder");
  el.suggestions.classList.remove("open");
  el.suggestions.innerHTML = "";
  showProductPreviewImage(product.sku);
}

el.skuSearch.addEventListener("input", () => {
  selectedProduct = null;
  el.productNameDisplay.textContent = "No product selected yet";
  el.productNameDisplay.classList.add("placeholder");
  hideProductPreviewImage();
  renderSuggestions(searchSkus(el.skuSearch.value));
});

el.skuSearch.addEventListener("keydown", (e) => {
  const options = Array.from(el.suggestions.children);
  if (options.length === 0) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, options.length - 1);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (activeSuggestionIndex >= 0) options[activeSuggestionIndex].click();
    return;
  } else {
    return;
  }

  options.forEach((opt, i) => opt.classList.toggle("active", i === activeSuggestionIndex));
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".autocomplete-wrap")) {
    el.suggestions.classList.remove("open");
  }
});

function handleAddItem() {
  const qty = parseInt(el.qtyInput.value, 10);

  if (!selectedProduct) {
    alert("Please type a valid SKU code and select it first.");
    return;
  }
  if (!qty || qty < 1) {
    alert("Quantity must be at least 1.");
    return;
  }

  const unitPrice = selectedProduct.base_price;
  const lineTotal = unitPrice * qty;

  quoteItems.push({
    name: selectedProduct.sku + "\n" + selectedProduct.name,
    sku: selectedProduct.sku,
    qty: qty,
    price: unitPrice,
    total: lineTotal,
  });

  renderTable();
}

function renderTable() {
  el.itemsTableBody.innerHTML = "";

  if (quoteItems.length === 0) {
    const emptyRow = document.createElement("tr");
    emptyRow.className = "empty-row";
    emptyRow.innerHTML = "<td colspan=\"4\">No items added yet - search a SKU above to add one.</td>";
    el.itemsTableBody.appendChild(emptyRow);
    updateGrandTotal();
    return;
  }

  quoteItems.forEach((item, index) => {
    const row = document.createElement("tr");
    row.dataset.index = index;
    if (index === selectedRowIndex) row.classList.add("selected");

    const imgPath = getProductImagePath(item.sku);
    const thumbHtml = imgPath
      ? "<img class=\"product-thumb\" src=\"" + imgPath + "\" alt=\"\" onerror=\"handleThumbError(this)\">"
      : "";

    row.innerHTML =
      "<td><div class=\"product-cell\">" +
        thumbHtml +
        "<span>" + nl2brWithBoldSku(item.name) + "</span>" +
      "</div></td>" +
      "<td>" + item.qty + "</td>" +
      "<td><input type=\"number\" class=\"row-price-input\" data-index=\"" + index +
        "\" value=\"" + item.price.toFixed(2) + "\" min=\"0\" step=\"0.01\" " +
        "onclick=\"event.stopPropagation()\"></td>" +
      "<td class=\"row-total-cell\">" + item.total.toFixed(2) + "</td>";

    row.addEventListener("click", () => {
      selectedRowIndex = index;
      renderTable();
    });

    el.itemsTableBody.appendChild(row);
  });

  updateGrandTotal();
}

function handleDeleteSelected() {
  if (selectedRowIndex === null) {
    alert("Select a row in the table first.");
    return;
  }
  quoteItems.splice(selectedRowIndex, 1);
  selectedRowIndex = null;
  renderTable();
}

// Current delivery-fee state from the UI: null when unticked, otherwise
// { desc, price } with a numeric price (0 when the field is blank).
function getDeliveryFee() {
  if (!el.deliveryFeeCheck.checked) return null;
  const price = parseFloat(el.deliveryPrice.value);
  return {
    desc: el.deliveryDesc.value.trim(),
    price: isFinite(price) && price > 0 ? price : 0,
  };
}

function getGrandTotal() {
  const itemsSum = quoteItems.reduce((sum, item) => sum + item.total, 0);
  const delivery = getDeliveryFee();
  return itemsSum + (delivery ? delivery.price : 0);
}

// RM currency string with thousands separators, e.g. 1234.5 -> "1,234.50".
function money(n) {
  return Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function updateGrandTotal() {
  el.grandTotalDisplay.textContent = "RM " + money(getGrandTotal());
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Product names are stored as "\n"-joined feature lines (one feature per
// line). This renders each line separately instead of mixing them together.
function nl2br(str) {
  return escapeHtml(str).replace(/\n/g, "<br>");
}

// Bare single-word colour/material feature lines (e.g. "Black", "Wood") get a
// label prefixed on display so they read "Colour: Black" / "Material: Wood".
const COLOUR_WORDS = new Set(["BLACK", "RED", "BLUE", "WHITE", "GRAY", "GREY", "YELLOW", "GREEN", "ORANGE", "PINK"]);
const MATERIAL_WORDS = new Set(["WOOD", "STAINLESS STEEL", "S STEEL"]);

function formatFeatureLine(f) {
  const trimmed = String(f).trim();
  const upper = trimmed.toUpperCase();
  if (COLOUR_WORDS.has(upper)) return "Colour: " + trimmed;
  if (MATERIAL_WORDS.has(upper)) return "Material: " + (upper === "S STEEL" ? "Stainless Steel" : trimmed);
  return f;
}

// First line of item.name is the SKU code; bold it to set it apart from
// the feature lines beneath it.
function nl2brWithBoldSku(str) {
  const lines = String(str).split("\n");
  const sku = escapeHtml(lines[0]);
  const rest = lines.slice(1).map(formatFeatureLine).map(escapeHtml).join("<br>");
  return "<strong>" + sku + "</strong>" + (rest ? "<br>" + rest : "");
}

// Reads a same-origin image and inlines it as a data: URI (fully portable --
// survives the .doc being emailed). fetch() is blocked on the file:// protocol
// though, so this returns null when the page is opened by double-clicking; the
// caller then falls back to an absolute file:// path that local Word can load.
function urlToDataUri(url) {
  return fetch(url)
    .then((res) => (res.ok ? res.blob() : null))
    .then((blob) => {
      if (!blob) return null;
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
    })
    .catch(() => null);
}

// Absolute URL of an asset relative to this page (e.g. file:///C:/.../assets/..).
function assetAbsoluteUrl(relPath) {
  try { return new URL(relPath, window.location.href).href; }
  catch (e) { return relPath; }
}

// Best image source for the exported doc: an embedded data: URI when possible
// (works over http / the local server), otherwise an absolute path that Word
// can resolve from disk when the file is opened on this same machine.
async function resolveImageForDoc(relPath) {
  if (!relPath) return null;
  const dataUri = await urlToDataUri(relPath);
  if (dataUri) return dataUri;
  return assetAbsoluteUrl(relPath);
}

function formatQuotationDate(date) {
  const day = date.getDate();
  const suffix = (day % 10 === 1 && day !== 11) ? "st"
    : (day % 10 === 2 && day !== 12) ? "nd"
    : (day % 10 === 3 && day !== 13) ? "rd" : "th";
  const month = date.toLocaleString("en-US", { month: "long" });
  return day + suffix + " " + month + " " + date.getFullYear();
}

// Bracketed blank field, e.g. blankField(10) -> "[          ]", so a fill-in
// spot reads as "click inside the brackets and type" rather than a run of
// underscores that has to be selected/deleted first.
function blankField(width) {
  return "[" + "&nbsp;".repeat(width) + "]";
}

// Sequential quotation serial: YYYYMMDD + 3-digit counter that resets to 001
// each calendar day and increments on every generation. Persisted in
// localStorage so the count survives page reloads within the same day.
function nextQuotationSerial() {
  const now = new Date();
  const ymd = now.getFullYear().toString() +
    String(now.getMonth() + 1).padStart(2, "0") +
    String(now.getDate()).padStart(2, "0");
  let counter = 1;
  try {
    const raw = localStorage.getItem("primaxsQuotationSerial");
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && obj.date === ymd && Number.isFinite(obj.counter)) {
        counter = obj.counter + 1;
      }
    }
    localStorage.setItem("primaxsQuotationSerial", JSON.stringify({ date: ymd, counter }));
  } catch (e) {
    // localStorage unavailable (private mode / restricted file://): fall back to
    // a time-based suffix so the serial is still unique within the day.
    counter = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) % 999 + 1;
  }
  return ymd + String(counter).padStart(3, "0");
}

// One row of the priced item table:
// No. | Description | UoM | Unit Price | Total Amt. The product's first feature
// line sits inline after the bold SKU; remaining lines become sub-bullets.
// Prices are fully computed (unit price typed in the app, total = unit x qty)
// so the generated document needs no manual editing.
function buildItemRowHtml(n, item) {
  const lines = String(item.name).split("\n");
  const sku = escapeHtml(lines[0]);
  const pname = lines[1] ? "(" + escapeHtml(lines[1]) + ")" : "";
  const restFeats = lines.slice(2);
  let descHtml = "Model&nbsp;: <b>" + sku + pname + "</b>";
  descHtml += restFeats
    .map((f) => "<br>&nbsp;&nbsp;&nbsp;&nbsp;- " + escapeHtml(formatFeatureLine(f)))
    .join("");
  descHtml += "<br>&nbsp;";

  const uom = item.qty + " unit" + (item.qty > 1 ? "s" : "");

  return (
    "<tr style=\"vertical-align:top;\">" +
      "<td style=\"white-space:nowrap; padding:3pt 8pt 0 0;\">" + n + ".)</td>" +
      "<td style=\"padding:3pt 0 0 0;\">" + descHtml + "</td>" +
      "<td style=\"white-space:nowrap; text-align:center; padding:3pt 10pt 0;\">" + uom + "</td>" +
      "<td style=\"white-space:nowrap; text-align:right; padding:3pt 10pt 0;\">" + money(item.price) + "</td>" +
      "<td style=\"white-space:nowrap; text-align:right; padding:3pt 0 0;\">" + money(item.total) + "</td>" +
    "</tr>"
  );
}

// Delivery-fee line: sits at the very bottom of the numbered item list. The
// typed description appears on an indented line under the title; the price is
// right-aligned in the Total Amt column.
function buildDeliveryRowHtml(n, delivery) {
  let descHtml = "<b>Delivery fee</b>";
  if (delivery.desc) {
    descHtml += "<br>&nbsp;&nbsp;&nbsp;&nbsp;" + escapeHtml(delivery.desc);
  }
  descHtml += "<br>&nbsp;";
  return (
    "<tr style=\"vertical-align:top;\">" +
      "<td style=\"white-space:nowrap; padding:3pt 8pt 0 0;\">" + n + ".)</td>" +
      "<td style=\"padding:3pt 0 0 0;\">" + descHtml + "</td>" +
      "<td style=\"white-space:nowrap; text-align:center; padding:3pt 10pt 0;\"></td>" +
      "<td style=\"white-space:nowrap; text-align:right; padding:3pt 10pt 0;\"></td>" +
      "<td style=\"white-space:nowrap; text-align:right; padding:3pt 0 0;\">" + money(delivery.price) + "</td>" +
    "</tr>"
  );
}

// Standalone photo-reference section, separate from the priced item list:
// "1) <product name>" followed by its photo, then "2) ..." and so on.
function buildPhotoEntryHtml(n, product, imageSrc) {
  const lines = String(product.name).split("\n");
  const label = escapeHtml(lines[0]) + (lines[1] ? "(" + escapeHtml(lines[1]) + ")" : "");
  const imgHtml = imageSrc
    ? "<img src=\"" + imageSrc + "\" width=\"195\" height=\"195\" style=\"width:195px!important;height:195px!important;max-width:195px!important;max-height:195px!important;display:block!important;margin:2pt 0 0!important;object-fit:contain;\">"
    : "<p style=\"font-style:italic; color:#666;\">(No photo available)</p>";
  return (
    "<p style=\"margin:6pt 0 0;\">" + n + ")&nbsp; <b>" + label + "</b></p>" +
    imgHtml
  );
}

async function handleGenerateDocument() {
  const customer = {
    name: el.customerName.value.trim(),
    contact: el.customerContact.value.trim(),
    address: el.customerAddress.value.trim(),
  };

  if (!customer.name) {
    alert("Please enter the customer name before generating the document.");
    return;
  }
  if (quoteItems.length === 0) {
    alert("Add at least one item to the quote first.");
    return;
  }

  const originalLabel = el.generateDocBtn.textContent;
  el.generateDocBtn.disabled = true;
  el.generateDocBtn.textContent = "Generating...";

  try {
    // Advance the daily serial only once per successful generation trigger.
    const serial = nextQuotationSerial();
    const delivery = getDeliveryFee();
    const html = await buildQuotationHtml(customer, quoteItems, serial, delivery);

    const blob = new Blob(["﻿", html], { type: "application/msword" });

    const safeName = customer.name.replace(/[^a-z0-9]+/gi, "_");
    const filename = `Quotation_${safeName}_${serial}.doc`;

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  } finally {
    el.generateDocBtn.disabled = false;
    el.generateDocBtn.textContent = originalLabel;
  }
}

el.addItemBtn.addEventListener("click", handleAddItem);
el.deleteItemBtn.addEventListener("click", handleDeleteSelected);
el.generateDocBtn.addEventListener("click", handleGenerateDocument);

// Delivery fee: reveal the description/price fields only when ticked.
el.deliveryFeeCheck.addEventListener("change", () => {
  el.deliveryFeeFields.style.display = el.deliveryFeeCheck.checked ? "" : "none";
  updateGrandTotal();
});
el.deliveryDesc.addEventListener("input", updateGrandTotal);
el.deliveryPrice.addEventListener("input", updateGrandTotal);

// Live-edit a row's unit price: recompute that row's line total and the grand
// total in place (no full re-render, so the input keeps focus while typing).
el.itemsTableBody.addEventListener("input", (e) => {
  const input = e.target.closest(".row-price-input");
  if (!input) return;
  const i = parseInt(input.dataset.index, 10);
  if (!(i >= 0 && i < quoteItems.length)) return;
  const price = parseFloat(input.value);
  quoteItems[i].price = isFinite(price) && price > 0 ? price : 0;
  quoteItems[i].total = quoteItems[i].price * quoteItems[i].qty;
  const row = input.closest("tr");
  const totalCell = row && row.querySelector(".row-total-cell");
  if (totalCell) totalCell.textContent = quoteItems[i].total.toFixed(2);
  updateGrandTotal();
});

renderTable();
